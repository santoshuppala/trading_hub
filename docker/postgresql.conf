# ── Connection ─────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 100
port = 5432

# ── Memory ─────────────────────────────────────────────────────────────────────
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB

# ── WAL / Checkpoints ──────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
wal_buffers = 4MB
synchronous_commit = off           # safe: Redpanda is the durability layer for critical events

# ── Planner ────────────────────────────────────────────────────────────────────
random_page_cost = 1.1          # SSD assumed
effective_io_concurrency = 200
default_statistics_target = 100

# ── Parallelism ────────────────────────────────────────────────────────────────
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# ── Logging ────────────────────────────────────────────────────────────────────
log_timezone = 'UTC'
log_min_duration_statement = 100    # log queries >100ms (catch slow feature-store analytics)
log_checkpoints = on
log_connections = off
log_disconnections = off

# ── TimescaleDB ────────────────────────────────────────────────────────────────
shared_preload_libraries = 'timescaledb'
timescaledb.max_background_workers = 8
timescaledb.telemetry_level = off

# ── Autovacuum (tuned for hypertables with high insert rate) ─────────────────
autovacuum_naptime = 10s                    # check every 10s (default 1min)
autovacuum_vacuum_scale_factor = 0.01       # vacuum at 1% modified (default 20%)
autovacuum_analyze_scale_factor = 0.005     # analyze at 0.5% modified

# ── Misc ───────────────────────────────────────────────────────────────────────
timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
